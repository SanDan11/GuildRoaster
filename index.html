<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <title>Daily Activity Report</title>
  </head>

  <body>
    <h1 id="title">Daily Activity Report</h1>

    <div id="officerField">
      <p>Name:</p>
      <input id="name" type="text">
      <p>Date</p>
      <input id="date" type="date">
      <p> Employee ID </p>
      <input id="employeeId" type="text">
    </div>

    <p>Post location</p>
    <input id="postLocation" type="text"> 

    <p>Incident Occurred?</p>
    <select id="incident">
      <option value="no">no</option>
      <option value="yes">yes</option>
    </select>

    <div id="inputFields">
        <p>Enter one activity per hour</p>
        <textarea class="entry" placeholder="Hour 1 - enter activity"></textarea>
        <textarea class="entry" placeholder="Hour 2 - enter activity"></textarea>
        <textarea class="entry" placeholder="Hour 3 - enter activity"></textarea>
        <textarea class="entry" placeholder="Hour 4 - enter activity"></textarea>
        <textarea class="entry" placeholder="Hour 5 - enter activity"></textarea>
        <textarea class="entry" placeholder="Hour 6 - enter activity"></textarea>
        <textarea class="entry" placeholder="Hour 7 - enter activity"></textarea>
        <textarea class="entry" placeholder="Hour 8 - enter activity"></textarea>
        <textarea class="entry" placeholder="Hour 9 - enter activity"></textarea>
        <textarea class="entry" placeholder="Hour 10 - enter activity"></textarea>
        <textarea class="entry" placeholder="Hour 11 - enter activity"></textarea>
        <textarea class="entry" placeholder="Hour 12 - enter activity"></textarea>
    </div>

    <div id="btnBox">
      <button id="btn">Submit</button>
      <button id="reset">Reset</button>
    </div>

    <div id="report"></div>

    <script src="app.js"></script>
  </body>
</html>
